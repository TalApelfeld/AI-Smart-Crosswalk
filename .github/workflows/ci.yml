name: CI

on:
  push:
    branches: [main, hadar, shalev, tal]
  pull_request:
    branches: [main, hadar, shalev, tal]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: smart-crosswalk/backend/package-lock.json

      - name: Install & validate Backend
        run: |
          cd smart-crosswalk/backend
          npm ci
          echo "Backend dependencies installed successfully"

      - name: Install & build Frontend
        run: |
          cd smart-crosswalk/frontend
          npm ci
          npm run build
        env:
          VITE_API_URL: /api
